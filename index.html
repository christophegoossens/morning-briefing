<script>
const SK = 'mib_v4';
let hist = [];
try { hist = JSON.parse(localStorage.getItem(SK) || '[]'); } catch(e) {}
if (!hist.find(b => b.date === LATEST_BRIEFING.date)) {
  hist.unshift(LATEST_BRIEFING);
  hist = hist.slice(0, 60);
  try { localStorage.setItem(SK, JSON.stringify(hist)); } catch(e) {}
}
let cur = 0;

const fmtFull  = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
const fmtShort = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fmtDay   = d => new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short'});
const x = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const dotSVG = `<svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>`;

function render() {
  document.getElementById('root').innerHTML = buildPage();
  document.querySelectorAll('.dtab').forEach((el,i) => el.addEventListener('click', () => { cur=i; render(); }));
}

function buildPage() {
  const b = hist[cur];
  if (!b) return `
    <div class="topbar"></div>
    <div class="header"><div class="header-inner"><div class="brand"><div class="brand-mark">📈</div><div class="brand-text"><div class="brand-name">Morning Investment Briefing</div><div class="brand-sub">Bolero Belgium · Curated Daily</div></div></div></div></div>
    <div class="page"><div class="empty"><div class="eicon">📋</div><h2>No briefings yet</h2><p>Your first briefing will appear here tomorrow morning.</p></div></div>`;

  const moodShort = (b.mood||'').split('—')[0].trim();
  const tabs = hist.map((h,i) => `<div class="dtab${i===cur?' active':''}"><span class="wd">${fmtDay(h.date)}</span>${fmtShort(h.date)}</div>`).join('');

  const macroRows = (b.macro||[]).map(m => `
    <div class="macro-row">
      <div class="macro-bullet">${dotSVG}</div>
      <div class="macro-text">${x(m)}</div>
    </div>`).join('');

  const stCards = (b.shortTerm||[]).map(p => `
    <div class="stock-card">
      <div class="card-bar st"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-ticker-wrap">
            <div class="card-ticker">${x(p.ticker)}</div>
            <div class="card-company">${x(p.name)}</div>
          </div>
          <span class="exch-chip">${x(p.exchange)}</span>
        </div>
        <div class="card-divider"></div>
        <div class="card-fields">
          <div class="card-field"><span class="field-key why">Why now</span><span class="field-val">${x(p.whyNow)}</span></div>
          <div class="card-field"><span class="field-key risk">Risk</span><span class="field-val">${x(p.risk)}</span></div>
        </div>
      </div>
    </div>`).join('');

  const ltCards = (b.longTerm||[]).map(p => `
    <div class="stock-card">
      <div class="card-bar lt"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-ticker-wrap">
            <div class="card-ticker">${x(p.ticker)}</div>
            <div class="card-company">${x(p.name)}</div>
          </div>
          <span class="exch-chip">${x(p.exchange)}</span>
        </div>
        <div class="card-divider"></div>
        <div class="card-fields">
          <div class="card-field"><span class="field-key why">Why buy</span><span class="field-val">${x(p.whyBuy)}</span></div>
          <div class="card-field"><span class="field-key entry">Entry</span><span class="field-val">${x(p.entry)}</span></div>
        </div>
      </div>
    </div>`).join('');

  const etfHTML = b.etf ? `
    <div class="etf-card">
      <div class="etf-bar"></div>
      <div class="etf-body">
        <div class="etf-top">
          <div class="etf-ticker-wrap">
            <div class="etf-ticker">${x(b.etf.ticker)}</div>
            <div class="etf-name">${x(b.etf.name)}</div>
            <div class="etf-exch">${x(b.etf.exchange)}</div>
          </div>
          <span class="horizon-chip">${x(b.etf.horizon)}</span>
        </div>
        <div class="etf-divider"></div>
        <div class="etf-rationale">${x(b.etf.rationale)}</div>
        ${b.etf.also ? `<div class="etf-also">${x(b.etf.also)}</div>` : ''}
      </div>
    </div>` : '';

  const watchCards = (b.watch||[]).map((w,i) => `
    <div class="watch-card">
      <div class="watch-num">${i+1}</div>
      <div class="watch-text">${x(w)}</div>
    </div>`).join('');

  return `
    <div class="topbar"></div>
    <div class="header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-mark">📈</div>
          <div class="brand-text">
            <div class="brand-name">Morning Investment Briefing</div>
            <div class="brand-sub">Bolero Belgium · Curated Daily</div>
          </div>
        </div>
        <div class="header-meta">
          <div class="header-date">${fmtFull(b.date)}</div>
          ${moodShort ? `<div class="mood-tag">${x(moodShort)}</div>` : ''}
        </div>
      </div>
      <div class="date-strip">${tabs}</div>
    </div>

    <div class="page">

      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon sky">🌍</div>
          <span class="sec-label">Macro Snapshot</span>
          <div class="sec-rule"></div>
        </div>
        <div class="macro-wrap">
          <div class="macro-bar"></div>
          <div class="macro-body">${macroRows}</div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon amber">🔥</div>
          <span class="sec-label">Short-Term Opportunities</span>
          <div class="sec-rule"></div>
        </div>
        <div class="stock-grid">${stCards || '<p style="color:var(--muted);font-size:13px">No short-term picks today.</p>'}</div>
      </div>

      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon green">📈</div>
          <span class="sec-label">Long-Term Watchlist</span>
          <div class="sec-rule"></div>
        </div>
        <div class="stock-grid">${ltCards || '<p style="color:var(--muted);font-size:13px">No long-term picks today.</p>'}</div>
      </div>

      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon violet">💡</div>
          <span class="sec-label">ETF of the Day</span>
          <div class="sec-rule"></div>
        </div>
        ${etfHTML || '<p style="color:var(--muted);font-size:13px">No ETF pick today.</p>'}
      </div>

      <div class="sec">
        <div class="sec-head">
          <div class="sec-icon rose">⚠️</div>
          <span class="sec-label">What to Watch Today</span>
          <div class="sec-rule"></div>
        </div>
        <div class="watch-list">${watchCards}</div>
      </div>

      ${b.mood ? `<div class="mood-footer"><strong>Overall mood:</strong> ${x(b.mood)}</div>` : ''}

      <div class="disclaimer">
        For informational purposes only — not financial advice. Always conduct your own research before making investment decisions.<br>
        Briefing history is stored locally in your browser (up to 60 days).
      </div>

    </div>`;
}

document.addEventListener('DOMContentLoaded', render);
</script>

<div id="root"></div>
</body>
</html>
